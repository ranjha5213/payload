name: Build ARM 32-bit (armv7l)

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install ARM toolchain
        run: |
          # 1. Add armhf foreign architecture
          sudo dpkg --add-architecture armhf

          # 2. Force ALL existing repositories to only look for amd64 packages
          #    Handles both legacy one-line sources.list format...
          sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i 's/deb https/deb [arch=amd64] https/g' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true

          #    ...and the newer deb822 format (/etc/apt/sources.list.d/ubuntu.sources)
          #    used by current Ubuntu 22.04 runner images. Without this, apt still
          #    tries to fetch nonexistent armhf indexes from security.ubuntu.com
          #    and archive.ubuntu.com, causing 404s during apt-get update.
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types: deb$/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi

          # 3. Add ports.ubuntu.com explicitly for armhf dependencies (Jammy 22.04)
          cat <<EOF | sudo tee -a /etc/apt/sources.list

          # ARMHF Repositories
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF

          # 4. Synchronize package lists
          sudo apt-get update
          
          # 5. Install the correct armhf cross-compiler and target dependencies
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          sudo apt-get install -y libc6-armhf-cross libc6-dev-armhf-cross
          sudo apt-get install -y libcrypt-dev:armhf
      
      - name: Compile for ARM 32-bit
        run: |
          # Compiling dirtyman.c and outputting it as dirtyman
          arm-linux-gnueabihf-gcc -Wall -O2 -mfpu=vfpv4 -mfloat-abi=hard -o dirtyman dirtyman.c -lpthread -lcrypt
          file dirtyman
      
      - name: Upload ARM binary
        uses: actions/upload-artifact@v4
        with:
          name: dirtyman-binary
          path: dirtyman
