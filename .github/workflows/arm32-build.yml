      - name: Install ARM toolchain
        run: |
          # 1. Add armhf foreign architecture
          sudo dpkg --add-architecture armhf

          # 2. Force ALL existing repositories (including security/mirrors) to only look for amd64 packages
          sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list /etc/apt/sources.list.d/* || true
          sudo sed -i 's/deb https/deb [arch=amd64] https/g' /etc/apt/sources.list /etc/apt/sources.list.d/* || true

          # 3. Add ports.ubuntu.com explicitly for armhf dependencies
          cat <<EOF | sudo tee -a /etc/apt/sources.list

          # ARMHF Repositories
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF

          # 4. Synchronize package lists
          sudo apt-get update
          
          # 5. Install the correct armhf cross-compiler and target dependencies
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          sudo apt-get install -y libc6-armhf-cross libc6-dev-armhf-cross
          sudo apt-get install -y libcrypt-dev:armhf

